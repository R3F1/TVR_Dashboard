<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC TV Dashboard - Target Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;800&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #0b1120;
            --card-bg: #1e293b; 
            --border-color: #334155;
            --accent-blue: #60a5fa;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', 'Arial', sans-serif;
            background-color: var(--bg-app);
            color: white;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            height: 110px;
            background: #0f172a;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
            z-index: 50;
            flex-shrink: 0;
        }

        /* ZEGAR */
        .clock-container {
            text-align: center;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
        }
        #clock {
            font-family: 'Verdana', 'Arial', sans-serif; 
            font-size: 70px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1;
            text-shadow: 2px 2px 0px #000000;
        }
        #date {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 5px;
        }

        /* GŁÓWNY LAYOUT (PODZIAŁ EKRANU) */
        .layout-container {
            display: flex;
            height: calc(100vh - 110px);
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* LEWY PANEL (KARTY DANYCH) - Zmiana na Flexbox */
        .left-panel {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            /* Rzędy idealnie podzielą między siebie dostępną wysokość */
            align-content: stretch; 
            overflow: hidden;
        }

        /* PRAWY PANEL (KONTAKTY) */
        .right-panel {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-left: 2px solid var(--border-color);
            padding-left: 20px;
            /* Wyśrodkowanie kontaktów w pionie dla lepszego balansu wizualnego */
            justify-content: center; 
            overflow: hidden;
        }

        .contacts-header {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .contact-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .contact-role {
            font-weight: 800;
            font-size: 1rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }
        .contact-phone {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }

        /* KARTY DANYCH */
        .data-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            
            /* Karty ułożą się 3 na górze i 2 na dole wypełniając całą lukę */
            flex: 1 1 calc(33.333% - 20px); 
            min-width: 300px;
            
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            background: #172033;
            padding: 0 10px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
        }

        .card-hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 10px 0;
            position: relative;
            min-height: 0; /* Zabezpieczenie dla dynamicznej wysokości */
        }

        .hero-label-top {
            position: absolute;
            top: 15px;
            font-size: 1rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }

        .hero-value {
            font-family: 'Chakra Petch', 'Arial', sans-serif;
            font-size: clamp(5rem, 7vw, 8rem); /* Responsywny, duży font */
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* STOPKA */
        .card-footer {
            height: 80px;
            display: flex;
            border-top: 1px solid var(--border-color);
            background: #1e293b;
        }

        .footer-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .footer-item.right {
            border-left: 1px solid var(--border-color);
        }

        .footer-label {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .footer-value {
            font-family: 'Chakra Petch', 'Arial', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        /* Style dla sekcji Absence */
        .absence-ok { background-color: #16a34a; }
        .absence-bad { background-color: #ef4444; }
        .absence-neutral { background-color: #475569; }
        
        .absence-ok .footer-label, 
        .absence-bad .footer-label {
            color: rgba(255,255,255,0.9);
        }

    </style>
</head>
<body>

    <header>
        <div style="width: 250px;">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-900 rounded border border-blue-500">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </div>
                <h1 class="text-2xl font-black text-blue-400 italic">HC REVIEW</h1>
            </div>
        </div>

        <div class="clock-container">
            <div id="clock">--:--</div>
            <div id="date">Ładowanie...</div>
        </div>

        <div style="width: 250px; text-align: right;">
            <div class="flex items-center justify-end gap-2">
                <span class="text-green-400 font-bold text-lg">ONLINE</span>
                <div style="width: 12px; height: 12px; background-color: #34d399; border-radius: 50%;"></div>
            </div>
        </div>
    </header>

    <div class="layout-container">
        <main id="app-container" class="left-panel">
            <div style="width: 100%; color: #64748b; text-align: center; margin-top: 50px; font-size: 24px;">
                WCZYTYWANIE DANYCH...
            </div>
        </main>

        <aside id="contacts-container" class="right-panel">
            <div class="contacts-header">Lista Kontaktów</div>
        </aside>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        // LISTA KONTAKTÓW Z OBRAZKA
        const contactsList = [
            { role: "MIK/PUR/TVR Supervisior", phone: "785 558 058" },
            { role: "SSBR / MNT Manager", phone: "667 656 561" },
            { role: "LOG/CANI Leader", phone: "785 691 317" },
            { role: "MNT Leader", phone: "785 558 089" },
            { role: "MIK/PUR/TVR Leader", phone: "725 329 143" },
            { role: "PD Leader", phone: "690 457 953" }
        ];

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            // Zostawiamy w spokoju nagłówek "Lista Kontaktów", dopisujemy pod nim karty
            contactsList.forEach(contact => {
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `
                    <div class="contact-role">${contact.role}</div>
                    <div class="contact-phone">${contact.phone}</div>
                `;
                container.appendChild(card);
            });
        }

        // ZEGAR
        function updateClockSafe() {
            var now = new Date();
            var hours = now.getHours();
            if (hours < 10) hours = "0" + hours;
            var minutes = now.getMinutes();
            if (minutes < 10) minutes = "0" + minutes;
            document.getElementById('clock').innerHTML = hours + ":" + minutes;

            var days = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
            var months = ['Stycznia', 'Lutego', 'Marca', 'Kwietnia', 'Maja', 'Czerwca', 'Lipca', 'Sierpnia', 'Września', 'Października', 'Listopada', 'Grudnia'];
            document.getElementById('date').innerHTML = days[now.getDay()] + ", " + now.getDate() + " " + months[now.getMonth()];
        }

        // DANE Z CSV
        async function loadData() {
            try {
                var cacheBuster = Math.floor(Math.random() * 100000);
                const res = await fetch(CSV_URL + '&t=' + cacheBuster);
                const text = await res.text();
                parseData(text);
            } catch (e) {
                console.error("Błąd pobierania danych:", e);
            }
        }

        function parseData(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            // Szuka wiersza nagłówkowego
            let headerRowIndex = rows.findIndex(r => r.some(c => c.includes('CPL') || c.includes('TVR')));
            if (headerRowIndex === -1) headerRowIndex = 1; 

            const groupRow = rows[headerRowIndex];     
            const valuesRow = rows[headerRowIndex + 2];    
            const diffRow = rows[headerRowIndex + 3];      

            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            for (let i = 0; i < groupRow.length - 1; i += 2) {
                let title = groupRow[i];
                if (!title || title === "") continue; 

                const valTarget = valuesRow[i] || "0"; 
                const valActual = valuesRow[i+1] || "0";
                
                let diffVal = diffRow[i+1];
                if (!diffVal || diffVal === "") diffVal = diffRow[i] || "0";
                
                const absenceClass = getAbsenceClass(diffVal);

                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-header">${title}</div>
                    
                    <div class="card-hero">
                        <div class="hero-label-top">ACTUAL</div>
                        <div class="hero-value">${valActual}</div>
                    </div>

                    <div class="card-footer">
                        <div class="footer-item">
                            <span class="footer-label">TOTAL</span>
                            <span class="footer-value">${valTarget}</span>
                        </div>
                        <div class="footer-item right ${absenceClass}">
                            <span class="footer-label">ABSENCE</span>
                            <span class="footer-value">${diffVal}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        // Zwraca klasę z odpowiednim tłem
        function getAbsenceClass(val) {
            const num = parseInt(val);
            if (isNaN(num)) return 'absence-neutral';
            if (num === 0) return 'absence-ok';
            return 'absence-bad'; 
        }

        // INICJALIZACJA
        renderContacts();
        setInterval(updateClockSafe, 1000);
        updateClockSafe();
        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
