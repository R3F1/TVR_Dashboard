<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC TV Dashboard Safe Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;800&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-app: #0b1120;
            --card-bg: #1e293b; 
            --border-color: #334155;
            --accent-blue: #60a5fa;
            --accent-orange: #fb923c;
            --accent-green: #34d399;
            --accent-red: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif; /* Domyślna czcionka */
            background-color: var(--bg-app);
            color: white;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER - BEZPIECZNY STYL */
        header {
            height: 120px;
            background: #0f172a; /* Ciemne tło bez przezroczystości (bezpieczniej) */
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: relative;
            z-index: 50;
        }

        /* Sekcja Zegara - PANCERNA */
        .clock-container {
            text-align: center;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); /* Centrowanie absolutne - działa zawsze */
            width: 400px;
        }

        #clock {
            /* Używamy Arial/Verdana bo są na każdym TV */
            font-family: 'Verdana', 'Arial', sans-serif; 
            font-size: 80px; /* Duży rozmiar */
            font-weight: bold;
            color: #ffffff; /* Czysta biel */
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000000; /* Prosty cień dla kontrastu */
            display: block;
        }

        #date {
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: bold;
        }

        /* GRID KART */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); /* Mniejsze minimum dla bezpieczeństwa */
            gap: 15px; /* Mniejszy odstęp */
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }
        .cards-grid::-webkit-scrollbar { width: 0; }

        /* KARTA */
        .data-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color); /* Grubsza ramka */
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card-header {
            background: #1e293b;
            padding: 0 10px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-blue);
            border-bottom: 2px solid var(--border-color);
            line-height: 1.1;
        }

        .card-subheaders {
            display: flex; /* Flex zamiast Grid (bezpieczniej dla starych TV) */
            height: 35px;
            border-bottom: 1px solid var(--border-color);
            background: #2d3748;
        }
        .subheader-item {
            flex: 1; /* Połowa szerokości */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent-orange);
            font-size: 0.9rem;
            text-transform: uppercase;
            border-right: 1px solid var(--border-color);
        }

        .card-values {
            display: flex; /* Flex zamiast Grid */
            flex-grow: 1;
            align-items: center;
            background: #0f172a;
        }
        .value-item {
            flex: 1;
            text-align: center;
            /* Chakra Petch jeśli zadziała, jak nie to Arial */
            font-family: 'Chakra Petch', 'Arial', sans-serif; 
            font-size: 5rem; 
            font-weight: 800;
            color: #ffffff;
        }

        .card-footer {
            height: 50px;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background: #1e293b;
        }
        
        .diff-value { font-size: 1.8rem; font-weight: 800; }
        .diff-pos { color: #34d399; }
        .diff-neg { color: #f87171; }
        .diff-zero { color: #64748b; }

    </style>
</head>
<body>

    <header>
        <div style="width: 250px;"> <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-900 rounded border border-blue-500">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </div>
                <h1 class="text-2xl font-black text-blue-400 italic">HC REVIEW</h1>
            </div>
        </div>

        <div class="clock-container">
            <div id="clock">--:--</div>
            <div id="date">Ładowanie...</div>
        </div>

        <div style="width: 250px; text-align: right;">
            <div class="flex items-center justify-end gap-2">
                <span class="text-green-400 font-bold text-lg">ONLINE</span>
                <div style="width: 12px; height: 12px; background-color: #34d399; border-radius: 50%;"></div>
            </div>
        </div>
    </header>

    <main id="app-container" class="cards-grid">
        <div style="color: #64748b; text-align: center; margin-top: 50px; font-size: 24px;">
            WCZYTYWANIE DANYCH...
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        // === 1. ZEGAR (STARY STYL - JS ES5) ===
        // To zadziała nawet na mikrofalówce
        function updateClockSafe() {
            var now = new Date();
            
            // Godzina
            var hours = now.getHours();
            if (hours < 10) hours = "0" + hours;
            
            var minutes = now.getMinutes();
            if (minutes < 10) minutes = "0" + minutes;
            
            document.getElementById('clock').innerHTML = hours + ":" + minutes;

            // Data (prosta tablica zamiast toLocaleDateString)
            var days = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
            var months = ['Stycznia', 'Lutego', 'Marca', 'Kwietnia', 'Maja', 'Czerwca', 'Lipca', 'Sierpnia', 'Września', 'Października', 'Listopada', 'Grudnia'];
            
            var dayName = days[now.getDay()];
            var dayNum = now.getDate();
            var monthName = months[now.getMonth()];
            
            document.getElementById('date').innerHTML = dayName + ", " + dayNum + " " + monthName;
        }

        // === 2. DANE ===
        async function loadData() {
            try {
                // Dodajemy losowy numer żeby TV nie trzymał starych danych w pamięci (cache)
                var cacheBuster = Math.floor(Math.random() * 100000);
                const res = await fetch(CSV_URL + '&t=' + cacheBuster);
                const text = await res.text();
                parseData(text);
            } catch (e) {
                console.error("Błąd:", e);
                // W razie błędu nie czyścimy ekranu, zostają stare dane
            }
        }

        function parseData(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            let headerRowIndex = rows.findIndex(r => r.some(c => c.includes('CPL')));
            if (headerRowIndex === -1) headerRowIndex = 1; 

            const groupRow = rows[headerRowIndex];     
            const valuesRow = rows[headerRowIndex + 2];    
            const diffRow = rows[headerRowIndex + 3];      

            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            for (let i = 0; i < groupRow.length - 1; i += 2) {
                let title = groupRow[i];
                if (!title || title === "") continue; 

                const valTotal = valuesRow[i] || "0";
                const valActual = valuesRow[i+1] || "0";
                
                let diffVal = diffRow[i+1];
                if (!diffVal || diffVal === "") diffVal = diffRow[i] || "0";
                
                // Uproszczony HTML bez ikon Lucide wewnątrz pętli (dla wydajności TV)
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-header">${title}</div>
                    <div class="card-subheaders">
                        <div class="subheader-item">Total</div>
                        <div class="subheader-item">Actual</div>
                    </div>
                    <div class="card-values">
                        <div class="value-item">${valTotal}</div>
                        <div class="value-item">${valActual}</div>
                    </div>
                    <div class="card-footer">
                        <span class="diff-label" style="color: #94a3b8; font-weight: bold; font-size: 14px;">RÓŻNICA</span>
                        <span class="diff-value ${getDiffColor(diffVal)}">${diffVal}</span>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function getDiffColor(val) {
            const num = parseInt(val);
            if (isNaN(num)) return 'diff-zero';
            if (num > 0) return 'diff-pos';
            if (num < 0) return 'diff-neg';
            return 'diff-zero';
        }

        // Uruchamiamy zegar od razu, nie czekając na dane
        setInterval(updateClockSafe, 1000);
        updateClockSafe();

        // Dane co 15 sekund
        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
