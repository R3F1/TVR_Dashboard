<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-color: #6366f1; /* Indigo */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Ukrycie paska przewijania, ale zachowanie funkcjonalności */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* HEADER Z EFEKTEM NEONU */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* TABELA */
        .table-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0; /* Brak odstępów dla efektu border */
            width: 100%;
        }

        /* Nagłówek Tabeli */
        thead th {
            position: sticky;
            top: 0;
            background-color: var(--bg-dark);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            padding: 16px 24px;
            text-align: left;
            border-bottom: 2px solid var(--accent-color);
            z-index: 20;
            white-space: nowrap;
        }

        /* Wiersze */
        tbody tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border-color);
        }

        tbody tr:nth-child(even) {
            background-color: rgba(30, 41, 59, 0.4); /* Zebra stripe */
        }

        tbody tr:hover {
            background-color: rgba(99, 102, 241, 0.1) !important; /* Podświetlenie */
            transform: scale(1.002);
        }

        /* Komórki */
        tbody td {
            padding: 20px 24px;
            font-size: 1.5rem; /* Duża czcionka dla TV */
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* Stylizacja Pierwszej Kolumny (np. ID) */
        tbody td:first-child {
            color: var(--accent-color);
            font-weight: 700;
            font-family: monospace; /* Techniczny wygląd */
            font-size: 1.4rem;
        }

        /* Statusy - przykładowe klasy kolorów */
        .status-green { color: #34d399 !important; font-weight: 700; }
        .status-red { color: #f87171 !important; font-weight: 700; }
        .status-yellow { color: #fbbf24 !important; font-weight: 700; }

        /* Animacja ładowania */
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-text { animation: pulse-glow 1.5s infinite; }
    </style>
</head>
<body>

    <header class="h-24 flex-none flex items-center justify-between px-8 z-50">
        <div class="flex items-center gap-4">
            <div class="relative flex h-4 w-4">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">DASHBOARD TV</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Live Data Stream</p>
            </div>
        </div>

        <div class="text-right">
            <div id="clock" class="text-5xl font-bold text-white leading-none tracking-tight" style="font-feature-settings: 'tnum';">00:00</div>
            <div id="date" class="text-indigo-400 text-sm font-bold uppercase tracking-widest mt-1"></div>
        </div>
    </header>

    <div class="table-wrapper" id="data-container">
        <div class="flex h-full w-full items-center justify-center">
            <div class="text-center">
                <div class="loading-text text-3xl font-light text-slate-500 mb-4">Wczytywanie danych...</div>
                <div class="text-sm text-slate-600">Łączenie z Google Sheets API</div>
            </div>
        </div>
    </div>

    <script>
        // === KONFIGURACJA ===
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        // === LOGIKA TABELI ===
        async function fetchData() {
            try {
                // Dodajemy timestamp, aby uniknąć cache'owania przez przeglądarkę
                const response = await fetch(SHEET_URL + '&t=' + Date.now());
                const data = await response.text();
                renderTable(data);
            } catch (error) {
                console.error('Błąd:', error);
            }
        }

        function renderTable(csvText) {
            // Prosty parser CSV
            const rows = csvText.split('\n').map(row => row.split(','));
            const cleanRows = rows.filter(row => row.length > 1 && row[0].trim() !== '');

            if (cleanRows.length === 0) return;

            const headers = cleanRows[0];
            const dataRows = cleanRows.slice(1);

            let html = '<table class="w-full"><thead><tr>';
            
            // Nagłówki
            headers.forEach(header => {
                html += `<th>${header.replace(/^"|"$/g, '')}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Wiersze
            dataRows.forEach(row => {
                // TUTAJ BYŁ BŁĄD - Poprawiono brakujący znak "<"
                html += '<tr>'; 
                
                row.forEach(cell => {
                    let text = cell.replace(/^"|"$/g, '').trim();
                    
                    // Automatyczne kolorowanie statusów (opcjonalne)
                    let classExtra = '';
                    const lowerText = text.toLowerCase();
                    if (lowerText === 'ok' || lowerText === 'done' || lowerText === 'completed') classExtra = 'status-green';
                    else if (lowerText === 'error' || lowerText === 'late' || lowerText === 'fail') classExtra = 'status-red';
                    else if (lowerText === 'pending' || lowerText === 'waiting') classExtra = 'status-yellow';

                    html += `<td class="${classExtra}">${text}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            
            const container = document.getElementById('data-container');
            // Podmieniamy HTML tylko jeśli jest inny (żeby nie mrugało przy odświeżaniu)
            if(container.innerHTML !== html) {
                container.innerHTML = html;
            }
        }

        // === ZEGAR ===
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', {weekday: 'long', day: 'numeric', month: 'long'});
        }

        // === INICJALIZACJA ===
        setInterval(updateClock, 1000);
        updateClock();
        fetchData();
        
        // Odświeżaj dane co 30 sekund
        setInterval(fetchData, 30000);
        
        // Odśwież całą stronę co godzinę (dla stabilności pamięci TV)
        setTimeout(() => window.location.reload(), 3600000);
    </script>
</body>
</html>
