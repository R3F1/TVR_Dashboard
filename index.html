<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Big Data Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --table-header: #1e293b;
            --row-even: #1e293b;
            --row-odd: #0f172a;
            --text-primary: #e2e8f0;
            --highlight: #3b82f6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Stylizacja scrollbara (ukryty, ale funkcjonalny) */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* HEADER */
        .header-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* TABELA - SERCE DASHBOARDU */
        .table-container {
            flex-grow: 1;
            overflow-y: auto; /* Przewijanie jeśli danych jest dużo */
            padding: 0 20px 20px 20px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px; /* Odstęp między wierszami */
        }

        thead th {
            position: sticky;
            top: 0;
            background: var(--bg-dark); /* Tło nagłówka */
            color: #94a3b8;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 20px;
            text-align: left;
            z-index: 10;
            border-bottom: 2px solid #334155;
        }

        tbody tr {
            background-color: var(--row-even);
            transition: transform 0.2s;
        }

        /* Stylizacja komórek */
        tbody td {
            padding: 24px 20px; /* DUŻE ODSTĘPY */
            font-size: 1.8rem; /* OGROMNA CZCIONKA DLA TV */
            font-weight: 600;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Zaokrąglenia wierszy */
        tbody tr td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; border-left: 1px solid rgba(255,255,255,0.05); }
        tbody tr td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; border-right: 1px solid rgba(255,255,255,0.05); }

        /* Wyróżnienie pierwszej kolumny */
        tbody td:first-child {
            color: var(--highlight);
            font-weight: 800;
        }

        /* Responsywność dla bardzo dużych ekranów */
        @media (min-width: 1920px) {
            tbody td { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="flex-none h-24 flex items-center justify-between px-10 bg-slate-900/50 border-b border-slate-800">
        <div class="flex items-center gap-4">
            <div class="h-4 w-4 bg-green-500 rounded-full animate-pulse shadow-[0_0_15px_#22c55e]"></div>
            <h1 class="text-2xl font-bold text-slate-400 tracking-widest uppercase">Logistics Monitor</h1>
        </div>
        
        <div class="text-right">
            <div id="clock" class="text-5xl font-black header-glow leading-none">00:00</div>
            <div id="date" class="text-slate-400 text-sm font-semibold uppercase tracking-widest mt-1"></div>
        </div>
    </header>

    <div class="table-container" id="data-container">
        <div class="flex h-full items-center justify-center text-slate-500 animate-pulse text-2xl">
            Pobieranie danych z chmury...
        </div>
    </div>

    <script>
        // === 1. KONFIGURACJA ===
        // Twój link, ale zmieniony na format CSV (Output=csv)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        // === 2. FUNKCJE POBIERANIA DANYCH ===
        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                parseAndRender(data);
            } catch (error) {
                console.error('Błąd pobierania:', error);
            }
        }

        // Prosty parser CSV (zakłada standardowe dane)
        function parseAndRender(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',')); // Prosty split (uwaga na przecinki w treści)
            
            // Usuwamy puste wiersze
            const cleanRows = rows.filter(row => row.length > 1 && row[0] !== '');

            if (cleanRows.length === 0) return;

            // Pierwszy wiersz to nagłówki
            const headers = cleanRows[0];
            const dataRows = cleanRows.slice(1);

            let html = '<table class="w-full"><thead><tr>';
            
            // Generuj nagłówki
            headers.forEach(header => {
                // Usuwamy cudzysłowy jeśli są
                const text = header.replace(/^"|"$/g, ''); 
                html += `<th>${text}</th>`;
            });
            html += '</tr></thead><tbody>';

            // Generuj wiersze
            dataRows.forEach(row => {
                html += 'tr class="hover:bg-slate-800 transition-colors">';
                row.forEach(cell => {
                    const text = cell.replace(/^"|"$/g, '');
                    html += `<td>${text}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('data-container').innerHTML = html;
        }

        // === 3. ZEGAR ===
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', {weekday: 'long', day: 'numeric', month: 'long'});
        }

        // === 4. AUTO-SCROLL (OPCJONALNE - DLA TV) ===
        // Jeśli tabela jest dłuższa niż ekran, powoli przewija w dół i wraca
        function autoScroll() {
            const container = document.getElementById('data-container');
            // Logika przewijania może być dodana tutaj jeśli potrzebna
        }

        // Start
        setInterval(updateClock, 1000);
        updateClock();
        fetchData(); // Pierwsze pobranie
        setInterval(fetchData, 60000); // Odświeżanie danych co 60 sekund
    </script>
</body>
</html>
