<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020617; /* Bardzo ciemne tło dla kontrastu na TV */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            /* Subtelne tło, żeby nie wypalało ekranu */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 60%);
            color: white;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden; /* Blokada scrollowania na TV */
            display: flex;
            flex-direction: column;
        }

        /* Zegar z efektem neonu */
        .neon-clock {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            font-feature-settings: "tnum"; /* Stała szerokość cyfr */
        }

        /* Główny kontener na tabelę */
        .tv-frame {
            flex-grow: 1;
            margin: 0 1.5vw 1.5vw 1.5vw; /* Marginesy responsywne */
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Ukrycie paska przewijania (scrollbar) wewnątrz iframe */
        /* Działa tylko jeśli domena jest ta sama, ale tutaj stylujemy kontener */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <header class="flex-none h-[12vh] flex items-center justify-center relative px-8">
        
        <div class="absolute left-8 flex items-center gap-3 opacity-60">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <span class="text-sm font-semibold tracking-widest uppercase text-slate-400">Live Feed</span>
        </div>

        <div class="text-center z-10">
            <h1 id="clock" class="text-5xl md:text-6xl font-black tracking-tight leading-none neon-clock">00:00</h1>
            <p id="date" class="text-slate-400 text-lg md:text-xl font-medium mt-1 uppercase tracking-wide opacity-80"></p>
        </div>

        <div class="absolute right-8">
             <button onclick="window.location.reload()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition-colors text-white/70">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
        </div>
    </header>

    <div class="tv-frame">
        <iframe 
            id="sheet-frame"
            src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pubhtml?widget=true&amp;headers=false&amp;chrome=false"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Formatowanie godziny (HH:MM:SS)
            const timeString = now.toLocaleTimeString('pl-PL', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            // Formatowanie daty (Dzień tygodnia, dzień miesiąc)
            const dateString = now.toLocaleDateString('pl-PL', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long' 
            });

            document.getElementById('clock').innerText = timeString;
            document.getElementById('date').innerText = dateString;
        }

        // Automatyczne odświeżanie strony co 10 minut (dla pewności aktualizacji danych na TV)
        setTimeout(() => {
            window.location.reload();
        }, 600000); // 600000 ms = 10 minut

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
