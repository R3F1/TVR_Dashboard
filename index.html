<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC Review Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #111827; /* Ciemne tło strony dla TV */
            
            /* Kolory z Twojego obrazka Excela */
            --excel-header-blue: #cfe2f3; 
            --excel-sub-orange: #fce5cd;
            --excel-row-diff: #d9ead3;
            --excel-green-title: #d9ead3;
            
            --text-dark: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: white;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Siatka kart */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            height: 100%;
            align-content: start;
        }

        /* Styl pojedycznej karty (jeden CPL) */
        .data-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* 1. Nagłówek karty (CPL...) - Niebieski */
        .card-header {
            background-color: var(--excel-header-blue);
            color: var(--text-dark);
            padding: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 1.4rem;
            border-bottom: 1px solid #999;
        }

        /* 2. Sekcja Total / Actual - Pomarańczowa */
        .card-subheaders {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: var(--excel-sub-orange);
            border-bottom: 1px solid #ccc;
        }
        .subheader-item {
            padding: 8px;
            text-align: center;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* 3. Wartości Liczbowe */
        .card-values {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            padding: 20px 0;
        }
        .value-item {
            text-align: center;
            font-family: 'Chakra Petch', sans-serif; /* Techniczny font do liczb */
            font-size: 3.5rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1;
        }

        /* 4. Stopka (Difference) - Zielona */
        .card-footer {
            background-color: var(--excel-row-diff);
            color: var(--text-dark);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            border-top: 1px solid #ccc;
        }
        .diff-label { font-size: 1rem; text-transform: uppercase; }
        .diff-value { font-size: 1.8rem; font-weight: 800; }

        /* Kolorowanie różnicy */
        .diff-pos { color: #166534; } /* Ciemna zieleń */
        .diff-neg { color: #dc2626; } /* Czerwień */
        .diff-zero { color: #555; }

    </style>
</head>
<body>

    <header class="h-20 flex items-center justify-between px-8 bg-slate-900 border-b border-slate-700">
        <h1 class="text-3xl font-bold text-green-400 tracking-wider">HC REVIEW DASHBOARD</h1>
        <div class="text-right">
            <div id="clock" class="text-3xl font-mono font-bold">00:00</div>
            <div id="date" class="text-xs text-slate-400 uppercase"></div>
        </div>
    </header>

    <div id="app-container" class="cards-grid">
        <div class="text-white text-xl p-10">Ładowanie danych...</div>
    </div>

    <script>
        // === ZMIEŃ LINK PONIŻEJ NA SWÓJ (z końcówką ?output=csv) ===
        // Ważne: Twój arkusz musi być udostępniony jako "Każdy mający link" -> Przeglądający
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        async function loadData() {
            try {
                const res = await fetch(CSV_URL + '&t=' + Date.now()); // cache busting
                const text = await res.text();
                parseData(text);
            } catch (e) {
                console.error("Błąd pobierania:", e);
            }
        }

        function parseData(csvText) {
            // Prosty parser CSV
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            // UWAGA: Tutaj dostosowujemy logikę do Twojego zrzutu ekranu.
            // Zakładam taką strukturę CSV po eksporcie złączonych komórek:
            // Row 0: "HC review", , , , ... (Tytuł)
            // Row 1: "CPL16601/TVR", "", "CPL16606/MIK", "", ... (Nagłówki grup co drugą kolumnę)
            // Row 2: "Total", "Actual", "Total", "Actual" ...
            // Row 3: 14, 15, 2, 2 ... (Wartości)
            // Row 4: "Difference", 1, "Difference", 0 ...
            
            // Znajdźmy wiersz z nagłówkami grup (szukamy wiersza zawierającego "CPL")
            let headerRowIndex = rows.findIndex(r => r.some(c => c.includes('CPL')));
            if (headerRowIndex === -1) headerRowIndex = 1; // Fallback

            const groupRow = rows[headerRowIndex];     // np. CPL...
            const subHeaderRow = rows[headerRowIndex + 1]; // Total / Actual
            const valuesRow = rows[headerRowIndex + 2];    // Liczby
            const diffRow = rows[headerRowIndex + 3];      // Difference row

            const container = document.getElementById('app-container');
            container.innerHTML = ''; // Wyczyść

            // Iterujemy co 2 kolumny, bo każda grupa zajmuje 2 kolumny (Total + Actual)
            for (let i = 0; i < groupRow.length - 1; i += 2) {
                
                // Pobieramy nazwę grupy. Jeśli pusta (przez merge), bierzemy z poprzedniej lub bieżącej
                let title = groupRow[i];
                if (!title) continue; // Pomiń puste

                // Pobieramy dane
                const valTotal = valuesRow[i] || "0";
                const valActual = valuesRow[i+1] || "0";
                
                // Różnica (zwykle w CSV po merge komórek "Difference" jest w col 1, a wartość w col 2)
                // Ale na zdjęciu widać Difference pod Total i Wartość pod Actual.
                // Sprawdzamy gdzie jest liczba.
                let diffVal = diffRow[i+1]; 
                
                // Generujemy HTML Karty
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-header">${title}</div>
                    
                    <div class="card-subheaders">
                        <div class="subheader-item">Total</div>
                        <div class="subheader-item">Actual</div>
                    </div>

                    <div class="card-values">
                        <div class="value-item">${valTotal}</div>
                        <div class="value-item">${valActual}</div>
                    </div>

                    <div class="card-footer">
                        <span class="diff-label">Różnica</span>
                        <span class="diff-value ${getDiffColor(diffVal)}">${diffVal}</span>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function getDiffColor(val) {
            const num = parseInt(val);
            if (isNaN(num)) return '';
            if (num > 0) return 'diff-pos'; // Zielony
            if (num < 0) return 'diff-neg'; // Czerwony
            return 'diff-zero';
        }

        // Zegar
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', {weekday:'short', day:'numeric', month:'short'});
        }

        setInterval(loadData, 10000); // Odświeżanie danych co 10 sek
        setInterval(updateClock, 1000);
        loadData();
        updateClock();

    </script>
</body>
</html>
