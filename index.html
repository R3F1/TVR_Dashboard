<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Data Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Brak paska przewijania samej strony */
        }

        /* Szklany efekt panelu */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Gradientowy tekst zegara */
        .clock-text {
            background: linear-gradient(to bottom, #ffffff 40%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-variant-numeric: tabular-nums; /* Aby cyfry nie skakały */
        }

        /* Stylizacja iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            /* Inwersja kolorów dla iframe (opcjonalne, zależne od wyglądu arkusza) */
            /* filter: invert(0.9) hue-rotate(180deg); */
            background: white;
        }

        /* Animacja pulsującej kropki */
        .pulse-dot {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 selection:bg-indigo-500 selection:text-white">

    <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-6">
        
        <div class="text-center md:text-left">
            <h1 id="clock" class="clock-text text-6xl md:text-7xl font-extrabold tracking-tight leading-none">00:00:00</h1>
            <p id="date" class="text-slate-400 text-lg md:text-xl font-medium mt-1 tracking-wide uppercase"></p>
        </div>

        <div class="flex flex-col items-center md:items-end gap-3">
            <div class="flex items-center gap-3 bg-slate-800/50 border border-white/5 px-4 py-2 rounded-full">
                <div class="w-3 h-3 bg-emerald-500 rounded-full pulse-dot"></div>
                <span class="text-emerald-400 text-xs font-bold tracking-widest uppercase">System Online</span>
            </div>
            
            <div class="flex gap-3">
                <button onclick="window.location.reload()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium rounded-lg transition-all border border-white/5 hover:border-white/10 group">
                    <i data-lucide="refresh-cw" class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500"></i>
                    Odśwież
                </button>
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pubhtml" target="_blank" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition-all shadow-lg shadow-indigo-500/20">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    Arkusz źródłowy
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 glass-panel rounded-3xl p-2 relative overflow-hidden flex flex-col">
        <div class="px-6 py-3 flex justify-between items-center border-b border-white/5 mb-2">
            <div class="flex items-center gap-2 text-slate-300">
                <i data-lucide="layout-grid" class="w-5 h-5 text-indigo-400"></i>
                <span class="font-semibold text-sm tracking-wide">DANE OPERACYJNE</span>
            </div>
            <div class="text-xs text-slate-500 font-mono">LIVE FEED API</div>
        </div>

        <div class="flex-1 w-full bg-white rounded-xl overflow-hidden relative">
            <iframe 
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pubhtml?widget=true&amp;headers=false&amp;chrome=false"
                loading="lazy">
            </iframe>
        </div>
    </main>

    <footer class="mt-4 text-center">
        <p class="text-[10px] text-slate-600 uppercase tracking-[0.2em]">Secure Data Visualization • v2.0</p>
    </footer>

    <script>
        // Inicjalizacja ikon
        lucide.createIcons();

        // Funkcja Zegara
        function updateTime() {
            const now = new Date();
            
            // Czas
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // Data (w języku polskim)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('pl-PL', options);
            document.getElementById('date').textContent = dateString;
        }

        // Aktualizuj co sekundę
        setInterval(updateTime, 1000);
        updateTime(); // Wywołaj od razu przy starcie
    </script>
</body>
</html>
