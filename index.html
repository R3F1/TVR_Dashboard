<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC TV Dashboard Perfect Align</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;800&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-app: #0b1120;
            --card-bg: #1e293b; 
            --border-color: #334155;
            
            --accent-blue: #60a5fa;
            --accent-orange: #fb923c;
            --accent-green: #34d399;
            --accent-red: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: white;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header-glow { text-shadow: 0 0 30px rgba(96, 165, 250, 0.6); }
        .title-gradient {
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* SIATKA KART - POPRAWIONA */
        .cards-grid {
            display: grid;
            /* Zmiana z 350px na 280px pozwoli zmieścić 5 kart w rzędzie na ekranie 1920px */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px;
            padding: 20px;
            height: 100%;
            align-content: start; /* Karty zaczynają od góry */
            overflow-y: auto;
        }
        .cards-grid::-webkit-scrollbar { width: 0; }

        /* KARTA DANYCH */
        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            height: 100%; /* Rozciągnij kartę do wysokości wiersza */
        }

        /* 1. Nagłówek (CPL) - SZTYWNA WYSOKOŚĆ */
        .card-header {
            background: rgba(30, 41, 59, 0.8);
            padding: 0 16px;
            /* Ustawiamy stałą wysokość nagłówka, żeby karty były równe */
            height: 70px; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 1.3rem; 
            color: var(--accent-blue);
            border-bottom: 2px solid var(--border-color);
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            /* Obsługa długich nazw - zawijanie tekstu */
            line-height: 1.2;
            overflow: hidden;
        }

        /* 2. Total / Actual */
        .card-subheaders {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(251, 146, 60, 0.1);
            border-bottom: 1px solid var(--border-color);
            height: 40px; /* Stała wysokość */
        }
        .subheader-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent-orange);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .subheader-item:first-child { border-right: 1px solid var(--border-color); }

        /* 3. LICZBY - ELASTYCZNE */
        .card-values {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Flex grow sprawi, że ta sekcja zajmie całe wolne miejsce */
            flex-grow: 1; 
            align-items: center; /* Wyśrodkowanie pionowe liczb */
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 10px 0;
        }
        .value-item {
            text-align: center;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 6.5rem; /* Troszkę mniejsze by się nie łamały przy 5 w rzędzie */
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); 
        }

        /* 4. Stopka (Różnica) - STAŁA WYSOKOŚĆ */
        .card-footer {
            background: rgba(16, 185, 129, 0.08);
            height: 60px; /* Stała wysokość */
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }
        .diff-label { 
            font-size: 0.9rem; font-weight: 600; text-transform: uppercase; color: #94a3b8; 
            display: flex; align-items: center; gap: 6px;
        }
        .diff-value { 
            font-size: 2.2rem; 
            font-weight: 800; 
            font-family: 'Chakra Petch', sans-serif; 
        }

        .diff-pos { color: var(--accent-green); text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
        .diff-neg { color: var(--accent-red); text-shadow: 0 0 15px rgba(248, 113, 113, 0.4); }
        .diff-zero { color: #64748b; }

    </style>
</head>
<body>

    <header class="flex-none h-24 px-6 flex items-center justify-between bg-slate-900/90 border-b border-slate-700 z-10">
        
        <div class="flex items-center gap-4 w-1/4">
            <div class="p-2 bg-blue-500/10 rounded-xl border border-blue-500/20 shadow-lg shadow-blue-500/10">
                <i data-lucide="monitor-play" class="w-8 h-8 text-blue-400"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter title-gradient">HC REVIEW</h1>
            </div>
        </div>

        <div class="flex-1 text-center">
            <div id="clock" class="text-6xl font-bold font-mono text-white leading-none header-glow" style="font-family: 'Chakra Petch';">00:00</div>
            <div id="date" class="text-blue-300/70 text-xs font-bold uppercase tracking-[0.3em] mt-1"></div>
        </div>

        <div class="w-1/4 flex justify-end items-center gap-3 opacity-80">
            <span class="text-emerald-400 font-bold text-sm">ONLINE</span>
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
        </div>
    </header>

    <main id="app-container" class="cards-grid">
        <div class="col-span-full flex h-full items-center justify-center flex-col gap-6 text-slate-500">
            <i data-lucide="loader" class="w-16 h-16 animate-spin opacity-50"></i>
            <span class="text-2xl font-black tracking-widest opacity-30">WCZYTYWANIE...</span>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        async function loadData() {
            try {
                const res = await fetch(CSV_URL + '&t=' + Date.now());
                const text = await res.text();
                parseData(text);
            } catch (e) {
                console.error("Błąd:", e);
            }
        }

        function parseData(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            let headerRowIndex = rows.findIndex(r => r.some(c => c.includes('CPL')));
            if (headerRowIndex === -1) headerRowIndex = 1; 

            const groupRow = rows[headerRowIndex];     
            const valuesRow = rows[headerRowIndex + 2];    
            const diffRow = rows[headerRowIndex + 3];      

            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            for (let i = 0; i < groupRow.length - 1; i += 2) {
                let title = groupRow[i];
                if (!title || title === "") continue; 

                const valTotal = valuesRow[i] || "0";
                const valActual = valuesRow[i+1] || "0";
                
                let diffVal = diffRow[i+1];
                if (!diffVal || diffVal === "") diffVal = diffRow[i] || "0";
                
                const card = document.createElement('div');
                card.className = 'data-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        ${title}
                    </div>
                    
                    <div class="card-subheaders">
                        <div class="subheader-item">Total</div>
                        <div class="subheader-item">Actual</div>
                    </div>

                    <div class="card-values">
                        <div class="value-item">${valTotal}</div>
                        <div class="value-item">${valActual}</div>
                    </div>

                    <div class="card-footer">
                        <span class="diff-label">
                            <i data-lucide="arrow-up-down" class="w-4 h-4"></i> Różnica
                        </span>
                        <span class="diff-value ${getDiffColor(diffVal)}">${diffVal}</span>
                    </div>
                `;
                container.appendChild(card);
            }
            lucide.createIcons();
        }

        function getDiffColor(val) {
            const num = parseInt(val);
            if (isNaN(num)) return 'diff-zero';
            if (num > 0) return 'diff-pos';
            if (num < 0) return 'diff-neg';
            return 'diff-zero';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(loadData, 15000); 
        setInterval(updateClock, 1000); 
        loadData();
        updateClock();
        lucide.createIcons();
    </script>
</body>
</html>
