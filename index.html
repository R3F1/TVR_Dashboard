<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC TV Dashboard - Target Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;800&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #0b1120;
            --card-bg: #1e293b; 
            --border-color: #334155;
            --accent-blue: #60a5fa;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Arial', sans-serif;
            background-color: var(--bg-app);
            color: white;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER - Oparty na VH/VW */
        header {
            height: 12vh;
            background: #0f172a;
            border-bottom: 0.3vh solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3vw;
            position: relative;
            z-index: 50;
            flex-shrink: 0;
        }

        .header-logo-container {
            display: flex;
            align-items: center;
            gap: 1vw;
        }
        
        .header-logo-icon {
            padding: 1vh;
            background: #1e3a8a;
            border-radius: 0.5vh;
            border: 0.2vh solid #3b82f6;
        }
        
        .header-logo-icon svg {
            width: 3.5vh;
            height: 3.5vh;
        }

        .header-title {
            font-size: 3vh;
            font-weight: 900;
            color: var(--accent-blue);
            font-style: italic;
        }

        /* ZEGAR */
        .clock-container {
            text-align: center;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        #clock {
            font-family: 'Verdana', 'Arial', sans-serif; 
            font-size: 6.5vh;
            font-weight: bold;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0.2vh 0.2vh 0px #000000;
        }
        #date {
            font-family: 'Arial', sans-serif;
            font-size: 1.5vh;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 0.5vh;
        }

        /* STATUS ONLINE */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.8vw;
        }
        .status-text {
            color: #4ade80;
            font-weight: bold;
            font-size: 2.2vh;
        }
        .status-dot {
            width: 1.5vh; 
            height: 1.5vh; 
            background-color: #34d399; 
            border-radius: 50%;
        }

        /* GŁÓWNY LAYOUT (PODZIAŁ EKRANU) */
        .layout-container {
            display: flex;
            height: 88vh; /* 100vh - 12vh header */
            padding: 2vh 2vw;
            gap: 2vw;
            overflow: hidden;
        }

        /* LEWY PANEL (KARTY DANYCH) */
        .left-panel {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 2vh 2vw;
            align-content: stretch; 
            overflow: hidden;
        }

        /* PRAWY PANEL (KONTAKTY) */
        .right-panel {
            flex: 0 0 23vw; /* Sztywna szerokość w procentach */
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            border-left: 0.2vw solid var(--border-color);
            padding-left: 2vw;
            justify-content: center; 
            overflow: hidden;
        }

        .contacts-header {
            font-size: 2vh;
            font-weight: 800;
            color: var(--text-muted);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2vw;
            margin-bottom: 1vh;
        }

        .contact-card {
            background: var(--card-bg);
            border: 0.2vh solid var(--border-color);
            border-radius: 1vh;
            padding: 1.5vh 1vw;
            text-align: center;
            box-shadow: 0 0.5vh 1vh -0.2vh rgba(0, 0, 0, 0.5);
        }
        .contact-role {
            font-weight: 800;
            font-size: 1.6vh;
            color: var(--accent-blue);
            margin-bottom: 0.5vh;
        }
        .contact-phone {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2.8vh;
            font-weight: 700;
            color: white;
            letter-spacing: 0.1vw;
        }

        /* KARTY DANYCH */
        .data-card {
            background: var(--card-bg);
            border: 0.2vh solid var(--border-color);
            border-radius: 1.5vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            
            /* Dzieli przestrzeń - jeśli są 3 w rzędzie, biorą ~33%, jeśli 2, biorą 50% */
            flex: 1 1 calc(33.333% - 1.5vw); 
            min-width: 20vw;
            
            box-shadow: 0 0.5vh 1vh -0.2vh rgba(0, 0, 0, 0.5);
        }

        .card-header {
            background: #172033;
            padding: 0 1vw;
            height: 6vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 2.2vh;
            color: var(--accent-blue);
            border-bottom: 0.2vh solid var(--border-color);
        }

        .card-hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            position: relative;
            min-height: 0;
        }

        .hero-label-top {
            position: absolute;
            top: 1.5vh;
            font-size: 1.8vh;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* OGROMNA CZCIONKA SKALUJĄCA SIĘ Z WYSOKOŚCIĄ TELEWIZORA */
        .hero-value {
            font-family: 'Chakra Petch', 'Arial', sans-serif;
            font-size: 16vh; 
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 3vh rgba(255,255,255,0.1);
        }

        /* STOPKA */
        .card-footer {
            height: 9vh;
            display: flex;
            border-top: 0.2vh solid var(--border-color);
            background: #1e293b;
        }

        .footer-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5vh;
        }

        .footer-item.right {
            border-left: 0.2vh solid var(--border-color);
        }

        .footer-label {
            font-size: 1.5vh;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.2vh;
        }

        .footer-value {
            font-family: 'Chakra Petch', 'Arial', sans-serif;
            font-size: 4vh;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        /* Style dla sekcji Absence */
        .absence-ok { background-color: #16a34a; }
        .absence-bad { background-color: #ef4444; }
        .absence-neutral { background-color: #475569; }
        
        .absence-ok .footer-label, 
        .absence-bad .footer-label {
            color: rgba(255,255,255,0.9);
        }

        .loading-text {
            width: 100%; 
            color: #64748b; 
            text-align: center; 
            margin-top: 5vh; 
            font-size: 3vh;
        }

    </style>
</head>
<body>

    <header>
        <div>
            <div class="header-logo-container">
                <div class="header-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </div>
                <h1 class="header-title">HC REVIEW</h1>
            </div>
        </div>

        <div class="clock-container">
            <div id="clock">--:--</div>
            <div id="date">Ładowanie...</div>
        </div>

        <div>
            <div class="status-container">
                <span class="status-text">ONLINE</span>
                <div class="status-dot"></div>
            </div>
        </div>
    </header>

    <div class="layout-container">
        <main id="app-container" class="left-panel">
            <div class="loading-text">WCZYTYWANIE DANYCH...</div>
        </main>

        <aside id="contacts-container" class="right-panel">
            <div class="contacts-header">Lista Kontaktów</div>
        </aside>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLj9I25auqf26IBHTeDVVQ4K45_y8lx-kAnJXvVDkSYRacfyT9fWJ6SzOnCxn9SAFzn2Pw-7M3y9Bc/pub?output=csv';

        const contactsList = [
            { role: "MIK/PUR/TVR Supervisior", phone: "785 558 058" },
            { role: "SSBR / MNT Manager", phone: "667 656 561" },
            { role: "LOG/CANI Leader", phone: "785 691 317" },
            { role: "MNT Leader", phone: "785 558 089" },
            { role: "MIK/PUR/TVR Leader", phone: "725 329 143" },
            { role: "PD Leader", phone: "690 457 953" }
        ];

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            contactsList.forEach(contact => {
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `
                    <div class="contact-role">${contact.role}</div>
                    <div class="contact-phone">${contact.phone}</div>
                `;
                container.appendChild(card);
            });
        }

        function updateClockSafe() {
            var now = new Date();
            var hours = now.getHours();
            if (hours < 10) hours = "0" + hours;
            var minutes = now.getMinutes();
            if (minutes < 10) minutes = "0" + minutes;
            document.getElementById('clock').innerHTML = hours + ":" + minutes;

            var days = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
            var months = ['Stycznia', 'Lutego', 'Marca', 'Kwietnia', 'Maja', 'Czerwca', 'Lipca', 'Sierpnia', 'Września', 'Października', 'Listopada', 'Grudnia'];
            document.getElementById('date').innerHTML = days[now.getDay()] + ", " + now.getDate() + " " + months[now.getMonth()];
        }

        async function loadData() {
            try {
                var cacheBuster = Math.floor(Math.random() * 100000);
                const res = await fetch(CSV_URL + '&t=' + cacheBuster);
                const text = await res.text();
                parseData(text);
            } catch (e) {
                console.error("Błąd pobierania danych:", e);
            }
        }

        function parseData(csvText) {
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            let headerRowIndex = rows.findIndex(r => r.some(c => c.includes('CPL') || c.includes('TVR')));
            if (headerRowIndex === -1) headerRowIndex = 1; 

            const groupRow = rows[headerRowIndex];     
            const valuesRow = rows[headerRowIndex + 2];    
            const diffRow = rows[headerRowIndex + 3];      

            const container = document.getElementById('app-container');
            container.innerHTML = ''; 

            for (let i = 0; i < groupRow.length - 1; i += 2) {
                let title = groupRow[i];
                if (!title || title === "") continue; 

                const valTarget = valuesRow[i] || "0"; 
                const valActual = valuesRow[i+1] || "0";
                
                let diffVal = diffRow[i+1];
                if (!diffVal || diffVal === "") diffVal = diffRow[i] || "0";
                
                const absenceClass = getAbsenceClass(diffVal);

                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-header">${title}</div>
                    
                    <div class="card-hero">
                        <div class="hero-label-top">ACTUAL</div>
                        <div class="hero-value">${valActual}</div>
                    </div>

                    <div class="card-footer">
                        <div class="footer-item">
                            <span class="footer-label">TOTAL</span>
                            <span class="footer-value">${valTarget}</span>
                        </div>
                        <div class="footer-item right ${absenceClass}">
                            <span class="footer-label">ABSENCE</span>
                            <span class="footer-value">${diffVal}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function getAbsenceClass(val) {
            const num = parseInt(val);
            if (isNaN(num)) return 'absence-neutral';
            if (num === 0) return 'absence-ok';
            return 'absence-bad'; 
        }

        renderContacts();
        setInterval(updateClockSafe, 1000);
        updateClockSafe();
        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
